:root{

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fnt);background:var(--page);min-height:100vh;color:var(--dark)}
header{background:linear-gradient(135deg,#E84040,#7048D4 50%,#0FA870);padding:12px 20px;text-align:center;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.2)}
header h1{font-size:clamp(1.1rem,4vw,1.7rem);font-weight:800;letter-spacing:.04em}
header p{font-size:.8rem;opacity:.88;margin-top:2px}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:8px 16px;background:#fff;border-bottom:1px solid #EEE}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.78rem;font-weight:700}
.leg-dot{width:11px;height:11px;border-radius:50%}
.layout{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 96px)}
@media(max-width:660px){
  .layout{grid-template-columns:1fr;height:auto}
  .lp{max-height:46vh}
  .rp{min-height:54vh}
}
.lp{overflow-y:auto;padding:10px 10px 16px;border-right:2px solid #EDEDED;background:#fff}

.grp{margin-bottom:6px}
.glabel{font-size:.68rem;font-weight:800;letter-spacing:.1em;padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:5px}
.gi .glabel{background:var(--ini-bg);color:var(--ini)}
.gm .glabel{background:var(--med-bg);color:var(--med)}
.gf .glabel{background:var(--fin-bg);color:var(--fin)}
.grow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:2px}
.bc{width:50px;height:50px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;font-weight:700;cursor:pointer;border:2px solid transparent;transition:transform .12s,box-shadow .12s;user-select:none;-webkit-tap-highlight-color:transparent}
.bc:hover{transform:scale(1.1)}
.bc:active{transform:scale(.93)}
.bc.i{background:var(--ini-bg);color:var(--ini);border-color:var(--ini-br)}
.bc.m{background:var(--med-bg);color:var(--med);border-color:var(--med-br)}
.bc.f{background:var(--fin-bg);color:var(--fin);border-color:var(--fin-br)}
.bc.sel.i{border-color:var(--ini);box-shadow:0 0 0 3px rgba(232,64,64,.28);transform:scale(1.12)}
.bc.sel.m{border-color:var(--med);box-shadow:0 0 0 3px rgba(112,72,212,.28);transform:scale(1.12)}
.bc.sel.f{border-color:var(--fin);box-shadow:0 0 0 3px rgba(15,168,112,.28);transform:scale(1.12)}
.rp{overflow-y:auto;background:var(--page);display:flex;align-items:flex-start;justify-content:center;padding:14px}
.hint{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:260px;color:var(--mid);text-align:center;padding:20px}
.hint .ico{font-size:3rem;margin-bottom:10px}
.hint p{font-size:.9rem;line-height:1.7}
.dcard{background:#fff;border-radius:20px;padding:18px;width:100%;max-width:340px;box-shadow:0 4px 22px rgba(0,0,0,.09);animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.sbox{background:#F7F8FA;border-radius:13px;padding:12px;margin-bottom:12px}
.stitle{font-size:.7rem;font-weight:800;color:var(--mid);letter-spacing:.08em;margin-bottom:8px}
.svg-wrap{display:flex;justify-content:center}
.imgbox{border-radius:14px;overflow:hidden;border:2px solid #EEE;margin-bottom:12px;background:#F4F6FF}
.imgarea{width:100%;height:160px;display:flex;align-items:center;justify-content:center}
.imgarea img{width:130px;height:130px;object-fit:contain}
.wordrow{display:flex;align-items:center;gap:6px;padding:10px 14px;background:#F7F8FA;border-top:1px solid #EEE;flex-wrap:wrap;justify-content:center}
.charblock{display:flex;flex-direction:row;align-items:center;gap:2px}
.hz{font-size:1.9rem;font-weight:700;font-family:var(--fzh);line-height:1}
.bpcol{display:flex;flex-direction:column;align-items:center}
.bpchars{display:flex;flex-direction:column;align-items:center;font-size:.82rem;font-family:var(--fzh);color:#333;line-height:1.25}
.bpchars span{display:block;text-align:center}
.tm-side{display:flex;flex-direction:row;align-items:flex-end}
.tone-r{font-size:.62rem;color:#888;margin-bottom:1px;align-self:flex-end}
.tm-top{display:flex;flex-direction:column;align-items:center}
.tone-t{font-size:.62rem;color:#888;line-height:1}
@keyframes ds{from{stroke-dashoffset:var(--dl)}to{stroke-dashoffset:0}}

  if (selCard) selCard.classList.remove('sel');

    if (zh) x.voice = zh; return x;
  }
  const u1 = u(item.sym), u2 = u(item.name);
  u1.onend = () => setTimeout(() => window.speechSynthesis.speak(u2), 280);
  window.speechSynthesis.speak(u1);
}

function loadEmoji(item, container) {
  container.innerHTML = '';
  if (!item.ec) { showFb(container, item); return; }
  const img = document.createElement('img');
  img.style.cssText = 'width:130px;height:130px;object-fit:contain';
  img.src = `https://fonts.gstatic.com/s/e/notoemoji/latest/${item.ec}/512.webp`;
  img.onerror = () => {
    if (img.src.includes('.webp')) {
      img.onerror = () => showFb(container, item);
      img.src = `https://fonts.gstatic.com/s/e/notoemoji/latest/${item.ec}/512.gif`;
    } else { showFb(container, item); }
  };
  container.appendChild(img);
}
function showFb(container, item) {
  container.innerHTML = `<span style="font-size:5.5rem;line-height:1">${getEmoji(item)}</span>`;
}
function getEmoji(item) {
  const map = {
    'еёғдёҒ':'рҹҚ®','иҳӢжһң':'рҹҚҺ','иІ“е’Ә':'рҹҗұ','жҲҝеӯҗ':'рҹҸ ','иӣӢзі•':'рҹҚ°','е…”еӯҗ':'рҹҗ°',
    'зүӣеҘ¶':'рҹҘӣ','иҖҒиҷҺ':'рҹҗҜ','зӢ—':'рҹҗ¶','жҒҗйҫҚ':'рҹҰ•','иқҙиқ¶':'рҹҰӢ','е…¬йӣһ':'рҹҗ“',
    'ж°Јзҗғ':'рҹҺҲ','иҘҝз“ң':'рҹҚү','иңҳиӣӣ':'рҹ•·пёҸ','и»Ҡеӯҗ':'рҹҡ—','зҚ…еӯҗ':'рҹҰҒ','зҶұзӢ—':'рҹҢӯ',
    'и¶ізҗғ':'вҡҪ','иҚүиҺ“':'рҹҚ“','йӣЁеӮҳ':'вҳӮпёҸ','иЎЈжңҚ':'рҹ‘•','зғҸйҫң':'рҹҗў','йӯҡе…’':'рҹҗҹ',
    'е–ҮеҸӯ':'рҹҺә','иҳҝи””':'рҹҘ•','йұ·йӯҡ':'рҹҗҠ','и‘үеӯҗ':'рҹҚғ','ж„ӣеҝғ':'вқӨпёҸ','йЈӣж©ҹ':'вңҲпёҸ',
    'жіЎжіЎ':'рҹ«§','жүӢ':'вңӢ','еҚ—з“ң':'рҹҺғ','жө·иұҡ':'рҹҗ¬','иһғиҹ№':'рҹҰҖ','йўЁз®Ҹ':'рҹӘҒ','иҖіжңө':'рҹ‘Ӯ'
  };
  return map[item.name] || 'рҹ–јпёҸ';
}

function mkCharBlocks(rdArr) {
  return rdArr.map(syl => {
    const tc = TONE[syl.t] || '';
    const pSpans = syl.p.map(ph => `<span>${ph}</span>`).join('');
    let bpHTML;
    if (syl.t === '0') {
      bpHTML = `<div class="bpcol tm-top">
        <span class="tone-t">${tc}</span>
        <div class="bpchars">${pSpans}</div>
      </div>`;
    } else {
      bpHTML = `<div class="bpcol tm-side">
        <div class="bpchars">${pSpans}</div>
        ${tc ? `<span class="tone-r">${tc}</span>` : ''}
      </div>`;
    }
    return `<div class="charblock">
      <span class="hz">${syl.h}</span>
      ${bpHTML}
    </div>`;
  }).join('');
}

function render(item) {
  const rp = document.getElementById('rp');
  const ghostPaths = item.sk.map(d =>
    `<path d="${d}" fill="none" stroke="#C8C8C8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>`
  ).join('');

  rp.innerHTML = `
    <div class="dcard">
      <div class="sbox">
        <div class="stitle">вңҸпёҸ зӯҶеҠғеӢ•з•«</div>
        <div class="svg-wrap">
          <svg id="ssvg" viewBox="0 0 100 100" width="130" height="130" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" fill="#EBEBEB" rx="7"/>
            <line x1="50" y1="0" x2="50" y2="100" stroke="#D5D5D5" stroke-width="0.5"/>
            <line x1="0" y1="50" x2="100" y2="50" stroke="#D5D5D5" stroke-width="0.5"/>
            ${ghostPaths}
            <g id="ag"></g>
          </svg>
        </div>
      </div>

      <div class="imgbox">
        <div class="imgarea" id="ea"><span style="font-size:2rem">вҸі</span></div>
        <div class="wordrow">
          ${mkCharBlocks(item.rd)}
        </div>
      </div>
    </div>`;

  loadEmoji(item, document.getElementById('ea'));
  animStrokes(item);
}

function animStrokes(item) {
  const g = document.getElementById('ag'); if (!g) return;
  const strokeColor = item.type === 'i' ? '#E84040' : item.type === 'm' ? '#7048D4' : '#0FA870';
  item.sk.forEach((d, i) => {
    setTimeout(() => {
      if (!document.getElementById('ag')) return;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', strokeColor);
      path.setAttribute('stroke-width', '5');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      g.appendChild(path);
      try {
        const len = path.getTotalLength() || 80;
        path.style.setProperty('--dl', len);
        path.style.strokeDasharray = len;
        path.style.strokeDashoffset = len;
        path.style.animation = 'ds .7s ease forwards';
      } catch(e) {
        path.style.opacity = '0';
        setTimeout(() => { path.style.transition = 'opacity .3s'; path.style.opacity = '1'; }, 20);
      }
    }, 800 + i * 800);
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  if (window.speechSynthesis.onvoiceschanged !== undefined)
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
</script>
