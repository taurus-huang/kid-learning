<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>學習樂園</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Huninn&family=Noto+Sans+TC:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:   #BEE3FF; 
    --cream: #FFF9F0; 
    --sun:   #FFD93D; 
    --coral: #E84040; 
    --grape: #7048D4; 
    --blue:  #4D96FF; 
    --grass: #22C55E; 
    --ink:   #2D2D2D; 
    --white: #FFFFFF;
    --sky-top:   #4AAEFF; 
    --grass-dark:#178A45; 
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* 文件本身不捲動，避免 Android Chrome 網址列收合動畫造成 fixed 背景跟著移動 */
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky) 55%, var(--sky) 100%);
    background-attachment: fixed; /* 天空固定貼齊視窗，捲動時不隨內容移動 */
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  body{
    position: relative;
  }

  /* 真正負責捲動的內層容器：只有標題和卡片在這裡面，
     天空、彩虹、草地、蟲蟲都在這層之外，維持固定不動 */
  .scroll-container{
    position: relative;
    z-index: 20;
    height: 100dvh;
    width: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(1.2rem, 4vw, 3rem) 1rem;
  }

  /* 底部草地層：固定貼齊下邊緣 */
  .ground-layer{
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    height: clamp(150px, 24vh, 260px);
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    background: transparent;
  }

  .grass-fill{
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 62%;
    background: var(--grass);
  }
  .ground-layer svg{
    position: absolute;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
  }

  /* --- 🍃 隨風擺動的 Emoji 花朵植物層 --- */
  .emoji-plants-layer {
    position: absolute;
    bottom: clamp(45px, 9vh, 90px);
    width: 100%;
    height: 50px;
    z-index: 1;
    pointer-events: none;
  }

  .emoji-plant {
    position: absolute;
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    transform-origin: bottom center;
    animation: plantSway 4s ease-in-out infinite alternate;
  }

  /* 5 種植物的搖擺動畫時長／延遲各自不同；實際水平位置改由 JS 隨機分佈 */
  .p1 { left: 6%;  animation-duration: 3.5s; }
  .p2 { left: 28%; animation-duration: 4.2s; animation-delay: -0.8s; }
  .p3 { left: 50%; animation-duration: 3.8s; animation-delay: -1.5s; }
  .p4 { left: 72%; animation-duration: 4.5s; animation-delay: -0.3s; }
  .p5 { left: 92%; animation-duration: 3.2s; animation-delay: -2.1s; }

  @keyframes plantSway {
    0% { transform: rotate(-5deg) scale(1); }
    100% { transform: rotate(6deg) scale(1.05); }
  }

  /* --- 🪲 Emoji 昆蟲小動物自由動態層 ---
     改用 fixed 定位並移到 .ground-layer 外面（見 body 內結構），
     因為草地層本身有 overflow:hidden + 有限高度，
     不管 z-index 設多高，巢狀在裡面的元素只要跳得比草地層還高，
     一樣會被草地層的邊界裁掉，跟 z-index 無關 */
  .emoji-bugs-layer {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    pointer-events: none;
  }

  .emoji-bug {
    position: absolute;
    display: inline-block;
  }

  /* 🦋 蝴蝶：外層負責路徑＋旋轉頭部朝向飛行方向，內層持續 mirror 翻轉模擬振翅 */
  .bug-butterfly {
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    bottom: clamp(65px, 11vh, 110px);
    left: 0;
    animation: flyPathButterfly 60s linear infinite;
  }
  .butterfly-flutter {
    display: inline-block;
    animation: flutterWings 0.3s ease-in-out infinite;
  }
  @keyframes flutterWings {
    0%, 100% { transform: scaleX(1); }
    50%      { transform: scaleX(-1); }
  }
  @keyframes flyPathButterfly {
    0%   { transform: translate(5vw, 0) rotate(90deg); }
    12%  { transform: translate(20vw, -60px) rotate(90deg); }
    24%  { transform: translate(35vw, 15px) rotate(90deg); }
    36%  { transform: translate(50vw, -65px) rotate(90deg); }
    48%  { transform: translate(85vw, 20px) rotate(90deg); }
    50%  { transform: translate(85vw, 20px) rotate(270deg); }
    62%  { transform: translate(65vw, -60px) rotate(270deg); }
    74%  { transform: translate(45vw, 15px) rotate(270deg); }
    86%  { transform: translate(25vw, -65px) rotate(270deg); }
    98%  { transform: translate(5vw, 20px) rotate(270deg); }
    100% { transform: translate(5vw, 0) rotate(90deg); }
  }

  /* 🐝 蜜蜂：左右「8字型」軌跡移動，加大上下擺動幅度，且頭部朝向移動方向 */
  .bug-bee {
    font-size: clamp(1.2rem, 2.2vw, 1.8rem);
    bottom: clamp(60px, 10vh, 100px);
    left: 0;
    animation: flyPathBee 16s linear infinite;
  }
  @keyframes flyPathBee {
    0%   { transform: translate(15vw, 0px) scaleX(-1); }
    12%  { transform: translate(28vw, -55px) scaleX(-1); }
    25%  { transform: translate(50vw, 0px) scaleX(-1); }
    38%  { transform: translate(68vw, 55px) scaleX(-1); }
    48%  { transform: translate(80vw, 0px) scaleX(-1); }
    50%  { transform: translate(80vw, 0px) scaleX(1); }
    62%  { transform: translate(68vw, -55px) scaleX(1); }
    75%  { transform: translate(50vw, 0px) scaleX(1); }
    88%  { transform: translate(28vw, 55px) scaleX(1); }
    98%  { transform: translate(15vw, 0px) scaleX(1); }
    100% { transform: translate(15vw, 0px) scaleX(-1); }
  }

  /* 🐞 瓢蟲：旋轉90度使頭部朝向爬行方向，加入輕微上下偏移不再死板，速度維持88秒一循環 */
  .bug-ladybug {
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    bottom: clamp(25px, 5vh, 45px);
    left: 0;
    animation: crawlLadybug 88s linear infinite;
  }
  @keyframes crawlLadybug {
    0%   { transform: translate(3vw, 0) rotate(90deg); }
    12%  { transform: translate(21vw, 7px) rotate(90deg); }
    24%  { transform: translate(39vw, -7px) rotate(90deg); }
    36%  { transform: translate(57vw, 7px) rotate(90deg); }
    48%  { transform: translate(92vw, -5px) rotate(90deg); }
    50%  { transform: translate(92vw, -5px) rotate(270deg); }
    62%  { transform: translate(74vw, 7px) rotate(270deg); }
    74%  { transform: translate(56vw, -7px) rotate(270deg); }
    86%  { transform: translate(38vw, 7px) rotate(270deg); }
    98%  { transform: translate(3vw, -5px) rotate(270deg); }
    100% { transform: translate(3vw, 0) rotate(90deg); }
  }

  /* 🦗 蚱蜢：拋物線跳躍，高度達到卡片下緣，且到盡頭時會轉向往回跳 */
  .bug-cricket {
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    bottom: clamp(20px, 4vh, 40px);
    left: 0;
    animation: jumpCricket 18s linear infinite;
  }
  @keyframes jumpCricket {
    0%   { transform: translate(15vw, 0) scaleX(-1); }
    5%   { transform: translate(22vw, -120px) scaleX(-1); }
    10%  { transform: translate(30vw, 0) scaleX(-1); }
    12%  { transform: translate(30vw, 0) scaleX(-1); }
    17%  { transform: translate(38vw, -120px) scaleX(-1); }
    22%  { transform: translate(45vw, 0) scaleX(-1); }
    24%  { transform: translate(45vw, 0) scaleX(-1); }
    29%  { transform: translate(53vw, -120px) scaleX(-1); }
    34%  { transform: translate(60vw, 0) scaleX(-1); }
    36%  { transform: translate(60vw, 0) scaleX(-1); }
    41%  { transform: translate(68vw, -120px) scaleX(-1); }
    46%  { transform: translate(75vw, 0) scaleX(-1); }
    
    49%  { transform: translate(75vw, 0) scaleX(1); }
    
    50%  { transform: translate(75vw, 0) scaleX(1); }
    55%  { transform: translate(68vw, -120px) scaleX(1); }
    60%  { transform: translate(60vw, 0) scaleX(1); }
    62%  { transform: translate(60vw, 0) scaleX(1); }
    67%  { transform: translate(53vw, -120px) scaleX(1); }
    72%  { transform: translate(45vw, 0) scaleX(1); }
    74%  { transform: translate(45vw, 0) scaleX(1); }
    79%  { transform: translate(38vw, -120px) scaleX(1); }
    84%  { transform: translate(30vw, 0) scaleX(1); }
    86%  { transform: translate(30vw, 0) scaleX(1); }
    91%  { transform: translate(22vw, -120px) scaleX(1); }
    96%  { transform: translate(15vw, 0) scaleX(1); }
    
    100% { transform: translate(15vw, 0) scaleX(-1); }
  }

  /* 🐌 蝸牛：修正頭部朝向與移動方向一致（往右飛/爬為-1，往左為1），且移動速度降低一半 (280秒一循環) */
  .bug-snail {
    font-size: clamp(1rem, 1.8vw, 1.4rem);
    bottom: clamp(10px, 2.5vh, 25px);
    left: 0;
    animation: crawlSnail 280s linear infinite;
  }
  @keyframes crawlSnail {
    0% { transform: translateX(2vw) scaleX(-1); }   /* 預設圖案頭朝左，往右前進時需鏡像朝右 */
    48% { transform: translateX(90vw) scaleX(-1); }
    50% { transform: translateX(90vw) scaleX(1); }   /* 往左走時轉回原來的左邊 */
    98% { transform: translateX(2vw) scaleX(1); }
    100% { transform: translateX(2vw) scaleX(-1); }
  }

  header, main{
    position: relative;
    z-index: 20; /* 確保卡片永遠在最上層，不被彩虹、雲朵、草地或飛舞的emoji蟲蟲蓋住 */
  }

  .cloud-wrap{
    position: fixed;
    z-index: 0;
    pointer-events: none;
  }
  .cloud-wrap svg{
    display: block;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .cloud-top{
    top: 4%;
    left: 0;
    width: clamp(90px, 11vw, 150px);
    height: clamp(50px, 6vw, 85px);
    animation: driftRight 84s linear infinite;
  }
  .cloud-top-2{
    top: 8%;
    left: 0;
    width: clamp(80px, 9.5vw, 130px);
    height: clamp(45px, 5.2vw, 74px);
    animation: driftRight 96s linear infinite;
    animation-delay: -48s;
  }
  .cloud-mid{
    top: 15%;
    left: 0;
    width: clamp(65px, 8vw, 110px);
    height: clamp(38px, 4.5vw, 62px);
    animation: driftRight 132s linear infinite;
  }
  .cloud-mid-2{
    top: 19%;
    left: 0;
    width: clamp(58px, 7vw, 96px);
    height: clamp(34px, 4vw, 55px);
    animation: driftRight 144s linear infinite;
    animation-delay: -72s;
  }
  .cloud-bottom{
    top: 26%;
    left: 0;
    width: clamp(45px, 5.5vw, 72px);
    height: clamp(26px, 3vw, 42px);
    animation: driftRight 192s linear infinite;
  }
  .cloud-bottom-2{
    top: 30%;
    left: 0;
    width: clamp(40px, 5vw, 64px);
    height: clamp(23px, 2.7vw, 37px);
    animation: driftRight 204s linear infinite;
    animation-delay: -108s;
  }

  @keyframes driftRight{
    0%   { transform: translateX(-20vw); }
    100% { transform: translateX(120vw); }
  }

  /* 🌈 天空中央的大彩虹：最高處對齊標題文字，兩側沒入草地 */
  .rainbow-big-wrap{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .rainbow-big-wrap svg{
    display: block;
    width: 100%;
    height: 100%;
  }

  header{
    text-align: center;
    margin-bottom: clamp(1.5rem, 5vw, 3rem);
  }

  .mascot{
    width: clamp(56px, 10vw, 84px);
    height: auto;
    display: block;
    margin: 0 auto 0.4rem;
    animation: bob 3.2s ease-in-out infinite;
  }

  @keyframes bob{
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-8px) rotate(4deg); }
  }

  h1{
    font-family: 'Huninn', sans-serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    margin: 0 0 0.3rem;
    color: var(--ink);
    letter-spacing: 0.05em;
    line-height: 1.6;
  }

  .zw{
    display: inline-flex;
    align-items: flex-start;
    vertical-align: bottom;
  }

  .zw-bpmf{
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.05;
    margin-left: 0.1em;
    margin-right: 0.42em;
  }

  .zw-bpmf span{
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 400;
    font-size: 0.34em;
    color: var(--ink);
    opacity: 0.62;
  }

  .zw-bpmf .tone{
    position: absolute;
    left: 100%;
    margin-left: 0.06em;
    line-height: 1;
  }

  .zw-bpmf .tone-top{ top: 4%; transform: translateY(-50%); }
  .zw-bpmf .tone-mid2{ top: 62%; transform: translateY(-50%); }
  .zw-bpmf .tone-mid3{ top: 78%; transform: translateY(-50%); }
  .zw-bpmf .tone-neutral{
    left: 50%;
    top: 0;
    margin-left: 0;
    transform: translate(-50%, -70%);
  }

  .zw-bpmf.n1{ top: 0.6em; }
  .zw-bpmf.n2{ top: 0.45em; }
  .zw-bpmf.n3{ top: 0.25em; }

  header p{
    margin: 0;
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: var(--ink);
    opacity: 0.75;
  }

  main{
    width: 100%;
    max-width: 960px;
  }

  .card-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: clamp(1.2rem, 4vw, 2.2rem);
    justify-items: stretch;
  }

  @media (min-width: 720px){
    .card-grid{
      max-width: 820px;
      margin: 0 auto;
    }
  }

  .card{
    --card-color: var(--coral);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.1rem;
    text-decoration: none;
    color: var(--ink);
    background: var(--white);
    border: 4px solid var(--ink);
    border-radius: 28px;
    padding: clamp(0.9rem, 2.6vw, 1.3rem) 0.8rem;
    min-height: 200px;
    box-shadow: 7px 7px 0 var(--ink);
    transform: translate(0, 0);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .card::before{
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 20px;
    background: var(--card-color);
    opacity: 0.12;
    z-index: 0;
    pointer-events: none;
  }

  .card__icon,
  .card__title{
    position: relative;
    z-index: 1;
  }

  .card__icon{
    width: clamp(70px, 17vw, 92px);
    height: clamp(70px, 17vw, 92px);
  }

  .card__title{
    font-family: 'Huninn', sans-serif;
    font-size: clamp(1.3rem, 3.6vw, 1.7rem);
    font-weight: 400;
    line-height: 1.6;
    transform: translateX(0.35em);
  }

  @media (hover: hover){
    .card:hover{
      transform: translate(-2px, -2px);
      box-shadow: 9px 9px 0 var(--ink);
      border-color: var(--card-color);
    }
  }

  .card:active{
    transform: translate(7px, 7px);
    box-shadow: 0 0 0 var(--ink);
  }

  .card:focus-visible{
    outline: 4px dashed var(--sun);
    outline-offset: 4px;
  }

  .card--placeholder{
    background: transparent;
    border-style: dashed;
    box-shadow: none;
    opacity: 0.55;
    cursor: default;
  }
  .card--placeholder::before{ display: none; }
  .card--placeholder:hover,
  .card--placeholder:active{
    transform: none;
    box-shadow: none;
  }

  footer{
    margin-top: clamp(2rem, 6vw, 3.5rem);
    font-size: 0.8rem;
    color: var(--ink);
    opacity: 0.55;
    text-align: center;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

  <!-- 🌈 天空中間的大彩虹：最高處對齊「學習樂園」標題，兩側往下延伸沒入草地被遮住 -->
  <div class="rainbow-big-wrap" aria-hidden="true">
    <svg id="rainbow-svg" viewBox="0 0 1280 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path class="rainbow-band" stroke="var(--coral)" fill="none" stroke-linecap="round"/>
      <path class="rainbow-band" stroke="var(--sun)" fill="none" stroke-linecap="round"/>
      <path class="rainbow-band" stroke="var(--grass)" fill="none" stroke-linecap="round"/>
      <path class="rainbow-band" stroke="var(--blue)" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="cloud-wrap cloud-top" aria-hidden="true">
    <svg viewBox="-80 -50 200 110" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="-30" cy="8" rx="36" ry="22" fill="#fff"/>
      <ellipse cx="14" cy="-10" rx="44" ry="28" fill="#fff"/>
      <ellipse cx="58" cy="10" rx="32" ry="20" fill="#fff"/>
      <ellipse cx="12" cy="20" rx="60" ry="20" fill="#fff"/>
    </svg>
  </div>
  <div class="cloud-wrap cloud-top-2" aria-hidden="true">
    <svg viewBox="-80 -50 200 110" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="-30" cy="8" rx="36" ry="22" fill="#fff"/>
      <ellipse cx="14" cy="-10" rx="44" ry="28" fill="#fff"/>
      <ellipse cx="58" cy="10" rx="32" ry="20" fill="#fff"/>
      <ellipse cx="12" cy="20" rx="60" ry="20" fill="#fff"/>
    </svg>
  </div>
  <div class="cloud-wrap cloud-mid" aria-hidden="true">
    <svg viewBox="-80 -50 200 110" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="-30" cy="8" rx="36" ry="22" fill="#fff"/>
      <ellipse cx="14" cy="-10" rx="44" ry="28" fill="#fff"/>
      <ellipse cx="58" cy="10" rx="32" ry="20" fill="#fff"/>
      <ellipse cx="12" cy="20" rx="60" ry="20" fill="#fff"/>
    </svg>
  </div>
  <div class="cloud-wrap cloud-mid-2" aria-hidden="true">
    <svg viewBox="-80 -50 200 110" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="-30" cy="8" rx="36" ry="22" fill="#fff"/>
      <ellipse cx="14" cy="-10" rx="44" ry="28" fill="#fff"/>
      <ellipse cx="58" cy="10" rx="32" ry="20" fill="#fff"/>
      <ellipse cx="12" cy="20" rx="60" ry="20" fill="#fff"/>
    </svg>
  </div>
  <div class="cloud-wrap cloud-bottom" aria-hidden="true">
    <svg viewBox="-80 -50 200 110" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="-30" cy="8" rx="36" ry="22" fill="#fff"/>
      <ellipse cx="14" cy="-10" rx="44" ry="28" fill="#fff"/>
      <ellipse cx="58" cy="10" rx="32" ry="20" fill="#fff"/>
      <ellipse cx="12" cy="20" rx="60" ry="20" fill="#fff"/>
    </svg>
  </div>
  <div class="cloud-wrap cloud-bottom-2" aria-hidden="true">
    <svg viewBox="-80 -50 200 110" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="-30" cy="8" rx="36" ry="22" fill="#fff"/>
      <ellipse cx="14" cy="-10" rx="44" ry="28" fill="#fff"/>
      <ellipse cx="58" cy="10" rx="32" ry="20" fill="#fff"/>
      <ellipse cx="12" cy="20" rx="60" ry="20" fill="#fff"/>
    </svg>
  </div>

  <div class="ground-layer" aria-hidden="true">
    <div class="grass-fill"></div>
    <svg viewBox="0 0 1600 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,110 C220,70 440,100 660,80 C880,60 1100,96 1320,74 C1420,64 1500,78 1600,68 L1600,220 L0,220 Z" fill="#22C55E"/>

  <script>
    (function(){
      const hourHand   = document.getElementById('mini-clock-hour');
      const minuteHand = document.getElementById('mini-clock-minute');
      if(!hourHand || !minuteHand) return;

      function updateMiniClock(){
        const now = new Date();
        const h = now.getHours() % 12;
        const m = now.getMinutes();
        const hourDeg   = (h + m / 60) * 30;
        const minuteDeg = m * 6;
        hourHand.setAttribute('transform',   `rotate(${hourDeg} 50 50)`);
        minuteHand.setAttribute('transform', `rotate(${minuteDeg} 50 50)`);
      }

      updateMiniClock();

      const msToNextMinute = 60000 - (now => now.getSeconds() * 1000 + now.getMilliseconds())(new Date());
      setTimeout(() => {
        updateMiniClock();
        setInterval(updateMiniClock, 60000);
      }, msToNextMinute);
    })();

    // 5 種植物隨機分佈在草地上：把草地寬度切成 5 等份，
    // 每種植物在自己的區段內取隨機位置，避免重疊、但每次載入位置都不同
    (function(){
      const plants = document.querySelectorAll('.emoji-plant');
      const n = plants.length;
      if(!n) return;
      const segment = 100 / n;
      const padding = segment * 0.15;
      plants.forEach((el, i) => {
        const min = i * segment + padding;
        const max = (i + 1) * segment - padding;
        const pos = min + Math.random() * (max - min);
        el.style.left = pos.toFixed(1) + '%';
      });
    })();

    // 🌈 大彩虹：以「正圓」弧線繪製，viewBox 直接對應像素尺寸，
    // 讓每一段色帶從最高處到兩側地平線的寬度完全一致（不受畫面比例拉伸影響）
    (function(){
      const svg = document.getElementById('rainbow-svg');
      if(!svg) return;
      const bands = svg.querySelectorAll('.rainbow-band');

      let lastWidth  = null; // 上次「真正」排版時的寬度
      let designH    = null; // 用來計算彩虹大小的高度基準，只有寬度改變時才更新

      function layoutRainbow(){
        const w = window.innerWidth;
        const h = window.innerHeight;

        // viewBox 隨時對齊「目前實際」的寬高，避免非等比例縮放造成色帶被拉伸變形
        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

        // 手機捲動時網址列顯示/隱藏只會改變高度，不會改變寬度。
        // 這種情況下天空（彩虹）維持原樣不重新計算，多出來的高度留給草地。
        const widthChanged = (lastWidth === null) || Math.abs(w - lastWidth) > 1;
        if(!widthChanged){
          return;
        }
        lastWidth = w;
        designH   = h;

        const centerX   = w / 2;
        const baseline  = designH * 0.90;           // 彩虹兩端落點：深入草地範圍，會被草地蓋住
        const topMargin = Math.max(designH * 0.10, 24); // 頂端保留的空間（含色帶本身粗細），避免橫向螢幕時彩虹頂被切掉
        let outerR      = w * 0.48;           // 最外圈（紅）半徑：兩側落在畫面邊緣附近
        const maxR      = (baseline - topMargin) / 1.045; // 1.045 ≈ 已預留半個色帶粗細的空間
        outerR = Math.min(outerR, maxR);      // 高度不足時（如橫向螢幕）縮小半徑，留出上方空間
        const strokeW   = Math.max(outerR * 0.09, 10); // 色帶粗細，四色一致

        bands.forEach((path, i) => {
          const r = outerR - i * strokeW;
          const x1 = centerX - r;
          const x2 = centerX + r;
          path.setAttribute('d', `M${x1},${baseline} A${r},${r} 0 0 1 ${x2},${baseline}`);
          path.setAttribute('stroke-width', strokeW.toFixed(2));
        });
      }

      layoutRainbow();
      window.addEventListener('resize', layoutRainbow);
    })();
  </script>
